name: Post Merge Health

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  post-merge-health:
    name: post-merge-health
    runs-on: ubuntu-latest
    env:
      RENDER_HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
    steps:
      - name: Select Render health endpoint for the merged branch
        run: |
          {
            echo "TARGET_HEALTHCHECK_URL=$RENDER_HEALTHCHECK_URL"
            echo "TARGET_HEALTHCHECK_LABEL=production"
          } >> "$GITHUB_ENV"

      - name: Skip when the branch healthcheck URL is not configured
        if: ${{ env.TARGET_HEALTHCHECK_URL == '' }}
        run: echo "Healthcheck URL non configurata per $TARGET_HEALTHCHECK_LABEL; controllo post-merge saltato."

      - name: Verify Render health endpoint
        if: ${{ env.TARGET_HEALTHCHECK_URL != '' }}
        run: curl --fail --silent --show-error --location "$TARGET_HEALTHCHECK_URL"
