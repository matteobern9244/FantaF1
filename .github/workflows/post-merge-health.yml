name: Post Merge Health

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  post-merge-health:
    name: post-merge-health
    runs-on: ubuntu-latest
    steps:
      - name: Skip when healthcheck URL is not configured
        if: ${{ secrets.RENDER_HEALTHCHECK_URL == '' }}
        run: echo "RENDER_HEALTHCHECK_URL non configurato; controllo post-merge saltato."

      - name: Verify Render health endpoint
        if: ${{ secrets.RENDER_HEALTHCHECK_URL != '' }}
        env:
          RENDER_HEALTHCHECK_URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
        run: curl --fail --silent --show-error --location "$RENDER_HEALTHCHECK_URL"
