name: PR CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run lint

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

  responsive-dev:
    name: responsive-dev
    runs-on: ubuntu-latest
    env:
      ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET_CI }}
      ASPNETCORE_ENVIRONMENT: Development
      CI: true
      MONGODB_DB_NAME_OVERRIDE: fantaf1_ci
      MONGODB_URI: ${{ secrets.MONGODB_URI_CI }}
      SAVE_SMOKE_EXPECTED_DATABASE_TARGET: fantaf1_ci
      SAVE_SMOKE_EXPECTED_ENVIRONMENT: development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Normalize Mongo URI for CI database override
        run: |
          if [ -z "$MONGODB_URI" ]; then
            echo "MONGODB_URI_CI secret is missing." >&2
            exit 1
          fi
          normalized_uri="$(node -e 'const uri = process.env.MONGODB_URI; const parsed = new URL(uri); parsed.pathname = "/"; process.stdout.write(parsed.toString())')"
          echo "::add-mask::$normalized_uri"
          {
            echo "MONGODB_URI<<EOF"
            echo "$normalized_uri"
            echo "EOF"
          } >> "$GITHUB_ENV"
      - run: npm ci
      - name: Start local stack
        run: |
          dotnet run --project backend-csharp/src/FantaF1.Api/FantaF1.Api.csproj -c Release --no-launch-profile > backend.log 2>&1 &
          echo $! > backend.pid
          npm run dev:frontend > frontend.log 2>&1 &
          echo $! > frontend.pid
      - name: Wait for local stack readiness
        run: |
          timeout 60 bash -lc 'until curl --fail --silent http://127.0.0.1:3002/api/health >/dev/null; do sleep 1; done'
          timeout 60 bash -lc 'until curl --fail --silent http://127.0.0.1:5173 >/dev/null; do sleep 1; done'
      - run: xvfb-run -a npm run test:ui-responsive
      - name: Dump local stack logs on failure
        if: failure()
        run: |
          echo "--- backend.log ---"
          cat backend.log || true
          echo "--- frontend.log ---"
          cat frontend.log || true
      - name: Stop local stack
        if: always()
        run: |
          if [ -f frontend.pid ]; then kill "$(cat frontend.pid)" || true; fi
          if [ -f backend.pid ]; then kill "$(cat backend.pid)" || true; fi

  smoke-ci-db:
    name: smoke-ci-db
    runs-on: ubuntu-latest
    env:
      ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET_CI }}
      ASPNETCORE_ENVIRONMENT: Development
      MONGODB_DB_NAME_OVERRIDE: fantaf1_ci
      MONGODB_URI: ${{ secrets.MONGODB_URI_CI }}
      SAVE_SMOKE_EXPECTED_DATABASE_TARGET: fantaf1_ci
      SAVE_SMOKE_EXPECTED_ENVIRONMENT: development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Normalize Mongo URI for CI database override
        run: |
          if [ -z "$MONGODB_URI" ]; then
            echo "MONGODB_URI_CI secret is missing." >&2
            exit 1
          fi
          normalized_uri="$(node -e 'const uri = process.env.MONGODB_URI; const parsed = new URL(uri); parsed.pathname = "/"; process.stdout.write(parsed.toString())')"
          echo "::add-mask::$normalized_uri"
          {
            echo "MONGODB_URI<<EOF"
            echo "$normalized_uri"
            echo "EOF"
          } >> "$GITHUB_ENV"
      - run: npm ci
      - name: Start backend
        run: |
          dotnet run --project backend-csharp/src/FantaF1.Api/FantaF1.Api.csproj -c Release --no-launch-profile > backend.log 2>&1 &
          echo $! > backend.pid
      - name: Wait for backend readiness
        run: |
          timeout 60 bash -lc 'until curl --fail --silent http://127.0.0.1:3002/api/health >/dev/null; do sleep 1; done'
      - run: npm run test:save-local
      - name: Dump backend log on failure
        if: failure()
        run: |
          echo "--- backend.log ---"
          cat backend.log || true
      - name: Stop backend
        if: always()
        run: |
          if [ -f backend.pid ]; then kill "$(cat backend.pid)" || true; fi

  build-csharp:
    name: build-csharp
    needs: [format-csharp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet build backend-csharp/FantaF1.Backend.sln -c Release

  test-csharp:
    name: test-csharp
    needs: [format-csharp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: npm ci
      - run: npm run test:csharp-coverage

  format-csharp:
    name: format-csharp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet format backend-csharp/FantaF1.Backend.sln --verify-no-changes
